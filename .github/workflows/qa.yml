# Deterministic quality gates — run on every push and PR.
# These cost NO tokens and NO GPU: they're just code running. The agentic
# review (usability/design/security judgement) runs separately on a schedule,
# not here — see qa/README.md.
name: QA gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install root (test tooling) + app deps.
      - run: npm ci || npm install
      - run: npm run install:all

      # 1. Lint + format — catches the sloppy stuff.
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
        continue-on-error: true # informational until the codebase is formatted once

      # 2. Secret scan — fails the build if a key/token was committed.
      #    Run the CLI directly (no action license needed for org repos).
      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz gitleaks
          ./gitleaks detect --no-banner --redact -c .gitleaks.toml --exit-code 1

      # 3. Dependency audit — high/critical CVEs (informational, won't block).
      - name: Dependency audit
        run: npm run deps:audit
        continue-on-error: true

      # 4. UI tests through the real browser (backend mocked). Skip @visual —
      #    pixel baselines are Windows-specific; visual runs locally.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: UI tests
        run: npx playwright test --grep-invert @visual

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
