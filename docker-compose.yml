services:

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      TTS_URL: http://tts:8000/v1/audio/speech
    expose:
      - "3001"
    depends_on:
      - tts
    volumes:
      - ./backend/data:/app/data   # persist generated-story log across rebuilds
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app          # live source — edits hot-reload
      - /app/node_modules        # keep image's installed deps
    depends_on:
      - backend

  tts:
    image: ghcr.io/matatonic/openedai-speech-min:latest
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./tts/voices:/app/voices   # cache downloaded Piper voices
    environment:
      TTS_HOME: /app/voices

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - ./certs/caddy_data:/data
    depends_on:
      - backend
      - frontend
