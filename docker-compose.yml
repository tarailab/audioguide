services:

  # Self-hosted Overpass (LT+LV extract) — kills public-server flakiness.
  # First boot builds the DB from osm/baltics.osm.pbf (a few minutes); after
  # that it serves at http://overpass/api/interpreter on this network.
  # NOTE: after a FRESH DB build the image leaves /db as 700, which makes the
  # web process fail with "Permission denied … osm3s_osm_base". One-time fix:
  #   docker exec audioguide-overpass-1 chmod -R o+rX /db
  # (persists in the named volume; only needed again if the volume is wiped).
  overpass:
    image: wiktorn/overpass-api
    restart: unless-stopped
    expose:
      - "80"
    environment:
      OVERPASS_MODE: init
      OVERPASS_META: "no"
      OVERPASS_PLANET_URL: "file:///osmdata/baltics.osm.pbf"
      OVERPASS_PLANET_PREPROCESS: 'osmium cat -o /db/planet.osm.bz2 /osmdata/baltics.osm.pbf --overwrite'
      OVERPASS_STOP_AFTER_INIT: "false"
      OVERPASS_RULES_LOAD: "10"
    volumes:
      - ./osm:/osmdata:ro
      - overpass_db:/db

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      TTS_URL: http://tts:8000/v1/audio/speech
    expose:
      - "3001"
    depends_on:
      - tts
      - overpass
    volumes:
      - ./backend/data:/app/data   # persist generated-story log across rebuilds
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app          # live source — edits hot-reload
      - /app/node_modules        # keep image's installed deps
    depends_on:
      - backend

  tts:
    image: ghcr.io/matatonic/openedai-speech-min:latest
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./tts/voices:/app/voices   # cache downloaded Piper voices
    environment:
      TTS_HOME: /app/voices

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - ./certs/caddy_data:/data
    depends_on:
      - backend
      - frontend

volumes:
  overpass_db:
